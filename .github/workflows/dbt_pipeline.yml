name: dbt Production Pipeline
# 1. runs automatically when a PR is merged into the main branch
# 2. runs on a schedule (e.g., every day at 8:00 AM UTC)
# 3. authenticate to GCP using github secret
# 4. install dbt with Python and run it from the dbt project directory
on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 8 1 * *"

jobs:
  dbt-execution:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: authenticate to google cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"
          create_credentials_file: true
          export_environment_variables: true

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-core==1.11.9 dbt-bigquery==1.11.1

      - name: install dbt dependencies
        working-directory: dbt
        run: dbt deps

      - name: build dbt project
        working-directory: dbt
        run: |
          dbt build --target prod
