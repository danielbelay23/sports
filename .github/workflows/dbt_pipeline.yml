name: dbt Production Pipeline
# 1. runs automatically when a PR is merged into the main branch
# 2. runs on a schedule (e.g., every day at 8:00 AM UTC)
# 3. authenticate to GCP using github secret
# 4. mount the repository and the injected GCP credentials into the Docker container
on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 8 1 * *"

jobs:
  dbt-execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Run dbt build
        run: |
          docker run --rm \
            --entrypoint bash \
            -v ${{ github.workspace }}:/usr/app \
            -v ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}:/tmp/gcp.json:ro \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp.json \
            -w /usr/app/dbt \
            ghcr.io/dbt-labs/dbt-bigquery:1.11.latest \
            -lc "dbt deps && dbt build --target prod"
